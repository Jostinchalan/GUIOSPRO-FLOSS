# Render.com — Configuración del backend GUIOSPRO FLOSS
# =====================================================
# Este archivo permite a Render desplegar automáticamente
# el backend FastAPI desde la carpeta /backend

services:
  - type: web
    name: guiospro-floss-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SCOPUS_API_KEY
        sync: false
